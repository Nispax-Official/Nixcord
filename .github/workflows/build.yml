name: Build & Deploy Nixcord

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Nixcord
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build core
        run: npm run build:core

      - name: Build extension
        run: npm run build:extension

      - name: Build installer
        run: npm run build:installer

      - name: Run tests
        run: npm test --if-present

      - name: Upload Chrome extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixcord-chrome
          path: extension/dist/chrome/
          retention-days: 30

      - name: Upload Firefox extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixcord-firefox
          path: extension/dist/firefox/
          retention-days: 30

      - name: Upload nixcord.js bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: nixcord-bundle
          path: core/dist/nixcord.js
          retention-days: 30

      # On pushes to main: commit the dist/ bundle so the updater can fetch it raw
      - name: Commit dist bundle to repository
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f core/dist/nixcord.js core/dist/panel.js || true
          git diff --staged --quiet || git commit -m "ci: update dist bundle [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && startsWith(github.event.head_commit.message, 'release:')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Extract version
        id: version
        run: echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Nixcord v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          files: |
            nixcord-chrome/**
            nixcord-firefox/**
            nixcord-bundle/nixcord.js
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
