<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nixcord</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      min-height: 160px;
      background: #1e1f22;
      color: #dcddde;
      font-family: 'gg sans', 'Noto Sans', sans-serif;
      font-size: 14px;
    }

    .header {
      background: linear-gradient(135deg, #5865F2 0%, #7289da 100%);
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 30px;
      height: 30px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 16px;
    }

    .title { font-size: 16px; font-weight: 700; color: #fff; }
    .subtitle { font-size: 11px; color: rgba(255,255,255,0.7); }

    .body { padding: 14px 16px; }

    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      margin-bottom: 10px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.green { background: #3ba55c; }
    .dot.yellow { background: #faa61a; }
    .dot.grey { background: #4f545c; }

    .status-text { font-size: 13px; color: #b9bbbe; flex: 1; }

    .btn {
      width: 100%;
      padding: 9px 12px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 8px;
      transition: filter 0.15s;
    }
    .btn:hover { filter: brightness(1.1); }
    .btn:last-child { margin-bottom: 0; }

    .btn-primary { background: #5865F2; color: #fff; }
    .btn-secondary { background: rgba(255,255,255,0.06); color: #dcddde; }
    .btn-update { background: #faa61a; color: #000; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .footer {
      padding: 8px 16px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .footer-text { font-size: 11px; color: #4f545c; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">N</div>
    <div>
      <div class="title">Nixcord</div>
      <div class="subtitle">by NISPAX InfoTech</div>
    </div>
  </div>

  <div class="body">
    <div class="status-row">
      <div class="dot grey" id="status-dot"></div>
      <span class="status-text" id="status-text">Loading...</span>
    </div>

    <button class="btn btn-primary" id="btn-settings">Open Settings</button>
    <button class="btn btn-secondary" id="btn-check">Check for Updates</button>
    <button class="btn btn-update" id="btn-update" style="display:none">Update Available</button>
  </div>

  <div class="footer">
    <span class="footer-text" id="footer-sha">build: dev</span>
    <span class="footer-text" id="footer-check">Never checked</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
